name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31

      - name: Check Nix worker closure
        run: nix flake check --print-build-logs

      - name: Check Elixir, Python, Rust, docs, and package
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            mix local.hex --force
            mix deps.get
            mix format --check-formatted
            mix compile --warnings-as-errors
            mix test
            python -m pytest -q worker_tests
            cargo fmt --all --check
            cargo clippy --all-targets -- -D warnings
            mix docs
            mix hex.build
          '
